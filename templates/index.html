<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새마을금고 월지급식 금리 조회</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <h1>🏦 새마을금고 금리 조회</h1>
    <span class="subtitle">정기예탁금 12개월 이상 · 거치식예탁금</span>
  </div>
</header>

<main>
  <!-- 컨트롤 바 -->
  <div class="control-bar">
    <div class="control-left">
      <input type="text" id="searchInput" placeholder="금고명 / 주소 검색..." autocomplete="off">
      <select id="regionSelect">
        <option value="">전체 지역</option>
        <option>서울</option><option>인천</option><option>경기</option>
        <option>강원</option><option>충남</option><option>충북</option>
        <option>대전</option><option>세종</option><option>경북</option>
        <option>경남</option><option>대구</option><option>부산</option>
        <option>울산</option><option>전북</option><option>전남</option>
        <option>광주</option><option>제주</option>
      </select>
      <label class="toggle-label">
        <input type="checkbox" id="onlyMonthly" checked>
        <span>월지급식 있는 금고만</span>
      </label>
    </div>
    <div class="control-right">
      <span id="countBadge" class="badge">-</span>
      <button id="scrapeBtn" class="btn-scrape">🔄 금리 재수집</button>
    </div>
  </div>

  <!-- 진행 바 (숨김) -->
  <div id="progressWrap" class="progress-wrap hidden">
    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    <span id="progressText">준비 중...</span>
  </div>

  <!-- 통계 -->
  <div id="statsBar" class="stats-bar"></div>
  <div id="visitBar" class="stats-bar" style="font-size:0.8rem;color:#888;margin-top:2px;"></div>

  <!-- 테이블 -->
  <div class="table-wrap">
    <table id="rateTable">
      <thead>
        <tr>
          <th data-col="r1"       class="sortable">지역</th>
          <th data-col="r2"       class="sortable">시군구</th>
          <th data-col="name"     class="sortable">금고명</th>
          <th data-col="div_nm">지점</th>
          <th data-col="addr"     class="tl">주소</th>
          <th data-col="monthly_12m"  class="sortable num">월지급식<br><small>12개월↑</small></th>
          <th data-col="maturity_12m" class="sortable num">만기지급식<br><small>12개월↑</small></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<!-- OTP 모달 -->
<div id="otpModal" class="modal-backdrop hidden">
  <div class="modal">
    <h3>🔒 금리 재수집 인증</h3>

    <!-- Step 1: 인증번호 발송 -->
    <div id="otpStep1">
      <p id="otpDesc">버튼을 클릭하면 등록된 이메일로 인증번호를 발송합니다.</p>
      <div class="modal-btns">
        <button id="otpCancelBtn" class="btn-cancel">취소</button>
        <button id="otpSendBtn" class="btn-confirm">인증번호 발송</button>
      </div>
    </div>

    <!-- Step 2: 인증번호 입력 -->
    <div id="otpStep2" class="hidden">
      <p id="otpSentMsg"></p>
      <input type="text" id="otpInput" placeholder="인증번호 6자리" maxlength="6" autocomplete="off">
      <div id="otpError" class="pw-error hidden"></div>
      <div class="modal-btns">
        <button id="otpResendBtn" class="btn-cancel">재발송</button>
        <button id="otpConfirmBtn" class="btn-confirm">수집 시작</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
