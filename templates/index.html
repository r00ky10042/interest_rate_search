<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 기본 SEO -->
<title>새마을금고 금리 비교 | 전국 월지급식 정기예탁금 금리 조회</title>
<meta name="description" content="전국 새마을금고 정기예탁금 12개월 이상 월지급식·만기지급식 금리를 한눈에 비교하세요. 지역별·금고명 검색, 금리 높은 순 정렬 제공.">
<meta name="keywords" content="새마을금고 금리, 새마을금고 정기예탁금, 월지급식 금리, 새마을금고 이자, 새마을금고 예금 금리, 금리 비교, 고금리 예금, 새마을금고 금리 순위, 정기예탁금 금리 비교, 새마을금고 월이자">
<meta name="author" content="새마을금고 금리 조회">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://interest-rate-search.onrender.com/">

<!-- Open Graph (카카오·페이스북 공유) -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://interest-rate-search.onrender.com/">
<meta property="og:title" content="새마을금고 금리 비교 | 전국 월지급식 정기예탁금">
<meta property="og:description" content="전국 새마을금고 정기예탁금 월지급식 금리를 한눈에 비교. 금리 높은 순 정렬·지역별 검색 제공.">
<meta property="og:locale" content="ko_KR">
<meta property="og:site_name" content="새마을금고 금리 조회">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="새마을금고 금리 비교 | 전국 월지급식 정기예탁금">
<meta name="twitter:description" content="전국 새마을금고 정기예탁금 월지급식 금리를 한눈에 비교. 금리 높은 순 정렬·지역별 검색 제공.">

<!-- 구조화 데이터 (JSON-LD) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "새마을금고 금리 조회",
  "url": "https://interest-rate-search.onrender.com/",
  "description": "전국 새마을금고 정기예탁금 12개월 이상 월지급식·만기지급식 금리 비교 서비스",
  "inLanguage": "ko",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "https://interest-rate-search.onrender.com/?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>

<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <h1>🏦 새마을금고 금리 조회</h1>
    <span class="subtitle">정기예탁금 12개월 이상 · 거치식예탁금</span>
  </div>
</header>

<main>
  <!-- 컨트롤 바 -->
  <div class="control-bar">
    <div class="control-left">
      <input type="text" id="searchInput" placeholder="금고명 / 주소 검색..." autocomplete="off">
      <select id="regionSelect">
        <option value="">전체 지역</option>
        <option>서울</option><option>인천</option><option>경기</option>
        <option>강원</option><option>충남</option><option>충북</option>
        <option>대전</option><option>세종</option><option>경북</option>
        <option>경남</option><option>대구</option><option>부산</option>
        <option>울산</option><option>전북</option><option>전남</option>
        <option>광주</option><option>제주</option>
      </select>
      <label class="toggle-label">
        <input type="checkbox" id="onlyMonthly" checked>
        <span>월지급식 있는 금고만</span>
      </label>
    </div>
    <div class="control-right">
      <span id="countBadge" class="badge">-</span>
      <button id="scrapeBtn" class="btn-scrape">🔄 금리 재수집</button>
    </div>
  </div>

  <!-- 진행 바 (숨김) -->
  <div id="progressWrap" class="progress-wrap hidden">
    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    <span id="progressText">준비 중...</span>
  </div>

  <!-- 통계 -->
  <div id="statsBar" class="stats-bar"></div>
  <div id="visitBar" class="stats-bar" style="font-size:0.8rem;color:#888;margin-top:2px;"></div>

  <!-- 테이블 -->
  <div class="table-wrap">
    <table id="rateTable">
      <thead>
        <tr>
          <th data-col="r1"       class="sortable">지역</th>
          <th data-col="r2"       class="sortable">시군구</th>
          <th data-col="name"     class="sortable">금고명</th>
          <th data-col="div_nm">지점</th>
          <th data-col="addr"     class="tl">주소</th>
          <th data-col="monthly_12m"  class="sortable num">월지급식<br><small>12개월↑</small></th>
          <th data-col="maturity_12m" class="sortable num">만기지급식<br><small>12개월↑</small></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<!-- OTP 모달 -->
<div id="otpModal" class="modal-backdrop hidden">
  <div class="modal">
    <h3>🔒 금리 재수집 인증</h3>

    <!-- Step 1: 인증번호 발송 -->
    <div id="otpStep1">
      <p id="otpDesc">버튼을 클릭하면 등록된 이메일로 인증번호를 발송합니다.</p>
      <div class="modal-btns">
        <button id="otpCancelBtn" class="btn-cancel">취소</button>
        <button id="otpSendBtn" class="btn-confirm">인증번호 발송</button>
      </div>
    </div>

    <!-- Step 2: 인증번호 입력 -->
    <div id="otpStep2" class="hidden">
      <p id="otpSentMsg"></p>
      <input type="text" id="otpInput" placeholder="인증번호 6자리" maxlength="6" autocomplete="off">
      <div id="otpError" class="pw-error hidden"></div>
      <div class="modal-btns">
        <button id="otpResendBtn" class="btn-cancel">재발송</button>
        <button id="otpConfirmBtn" class="btn-confirm">수집 시작</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
